<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Tavernetta e un sito editoriale multi-page per un ristorante italiano elegante, caldo e contemporaneo, con hero carousel immersivo e un tono visivo premium."
    />
    <title>Tavernetta</title>
    <script>
      (function () {
        const basePath = '%BASE_URL%';
        const params = new URLSearchParams(window.location.search);
        const redirect = params.get('redirect');

        if (!redirect) {
          return;
        }

        const normalizedBasePath = basePath.endsWith('/') ? basePath.slice(0, -1) : basePath;
        const nextPath = redirect.startsWith('/') ? redirect : `/${redirect}`;
        window.history.replaceState(null, '', `${normalizedBasePath}${nextPath}`);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
