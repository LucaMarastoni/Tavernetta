<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tavernetta</title>
    <script>
      (function () {
        var segments = window.location.pathname.split('/').filter(Boolean);
        var isProjectPage = window.location.hostname.endsWith('.github.io') && segments.length > 1;
        var rootPath = isProjectPage ? '/' + segments[0] + '/' : '/';
        var redirect = window.location.pathname + window.location.search + window.location.hash;
        sessionStorage.setItem('gh-pages-redirect', redirect);
        window.location.replace(window.location.origin + rootPath);
      })();
    </script>
  </head>
  <body></body>
</html>
